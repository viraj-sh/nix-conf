name: speedtesttracker
services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    volumes:
      - /home/virajs-server/docker/speedtest-tracker/data/speedtest-tracker/data:/config
    # ports:
    #   - ${SPEEDTEST_PORT}:80
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_KEY=${APP_KEY} # Generate app key using https://speedtest-tracker.dev
      - APP_URL=${APP_URL}
      - DB_CONNECTION=${DB_CONNECTION} #optional
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_SCHEDULE} #optional
      - SPEEDTEST_SERVERS=${SPEEDTEST_SERVERS}
      - DISPLAY_TIMEZONE=${DISPLAY_TIMEZONE} #optional
      - PRUNE_RESULTS_OLDER_THAN=0 #optional
    networks:
      - nginx
networks:
  nginx:
    external: true      
